<div class="fornecedor-form-page">
  <div class="form-wrapper">

  <header class="page-header">
    <div>
      <h1>{{ isEdicao ? 'Editar Fornecedor' : 'Novo Fornecedor' }}</h1>
      <p>Informe os dados do fornecedor para salvar as informações.</p>
    </div>
  </header>

  <form #fornecedorForm="ngForm" class="form" (ngSubmit)="salvar(fornecedorForm)">

    <!-- Tipo de Pessoa -->
    <div class="section-label">Tipo de Pessoa</div>
    <div class="tipo-pessoa">
      <label class="radio-label">
        <input type="radio" name="tipo" value="PF" [(ngModel)]="fornecedor.tipo" required>
        <span>Pessoa Física (PF)</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="tipo" value="PJ" [(ngModel)]="fornecedor.tipo" required>
        <span>Pessoa Jurídica (PJ)</span>
      </label>
    </div>

    <!-- Dados Básicos -->
    <div class="section-label" style="margin-top:1.25rem">Dados Básicos</div>
    <div class="field-grid">
      <label class="field" [class.full-width]="!mostrarRazaoSocial">
        <span>{{ labelNome }} *</span>
        <input type="text" name="nome" [(ngModel)]="fornecedor.nome" required
          [placeholder]="fornecedor.tipo === 'PF' ? 'Ex: João Silva' : 'Ex: Papelaria Central'">
      </label>

      <label class="field" *ngIf="mostrarRazaoSocial">
        <span>Razão Social *</span>
        <input type="text" name="razaoSocial" [(ngModel)]="fornecedor.razaoSocial"
          [required]="mostrarRazaoSocial" placeholder="Ex: Papelaria Central Ltda">
      </label>

      <label class="field">
        <span>{{ labelDocumento }} *</span>
        <input type="text" name="cpfCnpj" [(ngModel)]="fornecedor.cpfCnpj" required
          [placeholder]="fornecedor.tipo === 'PF' ? '000.000.000-00' : '00.000.000/0000-00'">
      </label>

      <label class="field">
        <span>Telefone *</span>
        <input type="tel" name="telefone" [(ngModel)]="fornecedor.telefone" required
          placeholder="(00) 00000-0000">
      </label>

      <label class="field full-width">
        <span>E-mail *</span>
        <input type="email" name="email" [(ngModel)]="fornecedor.email" required
          placeholder="exemplo@email.com">
      </label>

      <label class="field">
        <span>Tipo de Despesa *</span>
        <select name="tipoDespesa" [(ngModel)]="fornecedor.tipoDespesa" required>
          <option value="" disabled>Selecione o tipo</option>
          <option value="Material Escolar">Material Escolar</option>
          <option value="Alimentação">Alimentação</option>
          <option value="Manutenção">Manutenção</option>
          <option value="Serviços de TI">Serviços de TI</option>
          <option value="Limpeza e Higiene">Limpeza e Higiene</option>
          <option value="Transporte">Transporte</option>
          <option value="Uniforme">Uniforme</option>
          <option value="Energia / Água / Telefone">Energia / Água / Telefone</option>
          <option value="Outros">Outros</option>
        </select>
      </label>
    </div>

    <!-- Endereço -->
    <div class="section-label" style="margin-top:1.25rem">Endereço</div>
    <div class="field-grid">
      <label class="field">
        <span>CEP *</span>
        <input type="text" name="cep" [(ngModel)]="fornecedor.cep" required
          placeholder="00000-000">
      </label>

      <label class="field full-width">
        <span>Endereço Completo *</span>
        <input type="text" name="endereco" [(ngModel)]="fornecedor.endereco" required
          placeholder="Rua, número, bairro, cidade - UF">
      </label>
    </div>

    <div class="form-actions">
      <button type="button" class="ghost" (click)="voltar()">Cancelar</button>
      <button type="submit" class="primary">{{ isEdicao ? 'Atualizar' : 'Cadastrar' }}</button>
    </div>

  </form>

  </div>
</div>
