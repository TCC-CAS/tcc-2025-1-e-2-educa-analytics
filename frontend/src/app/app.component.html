<div class="app-shell">

  <aside class="sidebar" [class.expandido]="menuExpandido"
         (mouseenter)="menuExpandido = true"
         (mouseleave)="menuExpandido = false">

    <!-- Logo -->
    <div class="sidebar-top">
      <div class="brand-logo">
        <span class="logo-icon">EA</span>
        <span class="logo-label">EducaAnalytics</span>
      </div>
    </div>

    <!-- Navegação -->
    <nav class="sidebar-nav">

      <a class="nav-item" routerLink="/home" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span class="nav-label">Início</span>
      </a>

      <div class="nav-section-label">Acadêmico</div>

      <a class="nav-item" routerLink="/matricula/lista" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span class="nav-label">Matrículas</span>
      </a>

      <a class="nav-item" routerLink="/cronograma" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="14" x2="8" y2="18"/>
          <line x1="12" y1="14" x2="12" y2="18"/>
          <line x1="16" y1="14" x2="16" y2="18"/>
        </svg>
        <span class="nav-label">Cronograma</span>
      </a>

      <a class="nav-item" routerLink="/turmas" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span class="nav-label">Turmas</span>
      </a>

      <a class="nav-item" routerLink="/disciplinas" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
        </svg>
        <span class="nav-label">Disciplinas</span>
      </a>

      <a class="nav-item" routerLink="/avaliacoes" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span class="nav-label">Avaliações</span>
      </a>

      <a class="nav-item" routerLink="/eventos" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="nav-label">Eventos</span>
      </a>

      <div class="nav-section-label">Pessoas</div>

      <a class="nav-item" routerLink="/educandos" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="nav-label">Educandos</span>
      </a>

      <a class="nav-item" routerLink="/responsaveis" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <span class="nav-label">Responsáveis</span>
      </a>

      <a class="nav-item" routerLink="/educadores" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
        <span class="nav-label">Educadores</span>
      </a>

      <a class="nav-item" routerLink="/colaboradores" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/>
        </svg>
        <span class="nav-label">Colaboradores</span>
      </a>

      <div class="nav-section-label">Estrutura</div>

      <a class="nav-item" routerLink="/salas" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-label">Salas</span>
      </a>

      <div class="nav-section-label">Financeiro</div>

      <a class="nav-item" routerLink="/caixa" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
        </svg>
        <span class="nav-label">Caixa</span>
      </a>

      <a class="nav-item" routerLink="/fornecedores" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>
        </svg>
        <span class="nav-label">Fornecedores</span>
      </a>

      <a class="nav-item" routerLink="/dashboard-financeiro" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span class="nav-label">Dash. Financeiro</span>
      </a>

      <a class="nav-item" routerLink="/dashboard-escolar" routerLinkActive="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M18 20V10M12 20V4M6 20v-6"/>
          <circle cx="6" cy="14" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="4" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="18" cy="10" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        <span class="nav-label">Dash. Escolar</span>
      </a>

    </nav>

    <!-- Rodapé -->
    <div class="sidebar-bottom" *ngIf="usuarioLogado">
      <div class="user-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="nav-label">Usuário</span>
      </div>
      <button class="logout-btn" (click)="logout()" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="nav-label">Sair</span>
      </button>
    </div>

  </aside>

  <main class="main-content">
    <div class="content-scroll">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
