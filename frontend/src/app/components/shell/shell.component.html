<div class="app-shell" [class.sidebar-recolhido]="menuRecolhido">

  <aside class="sidebar">
    <!-- Cabeçalho da sidebar -->
    <div class="sidebar-header">
      <div class="brand" *ngIf="!menuRecolhido">
        <div class="logo">EA</div>
        <div class="brand-title">
          <span class="brand-sub">Educa</span>
          <strong class="brand-name">Analytics</strong>
        </div>
      </div>
      <div class="logo logo-collapsed" *ngIf="menuRecolhido">EA</div>
      <button class="btn-toggle" (click)="toggleSidebar()" [title]="menuRecolhido ? 'Expandir menu' : 'Recolher menu'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Navegação -->
    <nav class="sidebar-nav">
      <ul class="nav-list">

        <!-- Item: Matrículas -->
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/matricula/lista"
            routerLinkActive="nav-link-ativo"
            [title]="menuRecolhido ? 'Matrículas' : ''"
          >
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span class="nav-label" *ngIf="!menuRecolhido">Matrículas</span>
          </a>
        </li>

      </ul>
    </nav>

    <!-- Rodapé da sidebar (usuário + logout) -->
    <div class="sidebar-footer" *ngIf="usuarioLogado">
      <div class="user-info">
        <span class="user-avatar">👤</span>
        <div class="user-details" *ngIf="!menuRecolhido">
          <span class="user-nome">Usuário</span>
          <span class="user-role">Conectado</span>
        </div>
      </div>
      <button class="btn-logout" *ngIf="!menuRecolhido" (click)="logout()" title="Fazer logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
      <button class="btn-logout btn-logout-icon" *ngIf="menuRecolhido" (click)="logout()" title="Fazer logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-scroll">
      <router-outlet></router-outlet>
    </div>
    <footer class="app-footer">
      <p>&copy; 2026 EducaAnalytics. Todos os direitos reservados.</p>
    </footer>
  </main>
</div>
